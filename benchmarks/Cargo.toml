[package]
name = "fib"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]
path = "lib.rs"

[profile.release]
panic = "abort"
lto = true
opt-level = 3
strip = true
debug = false
debug-assertions = false
rpath = false
codegen-units = 1

[dependencies]
#criterion = { package = "codspeed-criterion-compat", version = "2.7" }
criterion = { version = "0.7.0", default-features = false, features = [] }

[dev-dependencies]
rwasm = { path = "..", features = ["std", "wasmtime"] }
wasmi = { version = "=0.31.2" }

[[bench]]
name = "bench"
harness = false