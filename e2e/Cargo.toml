[package]
name = "rwasm-e2e"
version = "0.1.0"
edition = "2021"

[dependencies]
rwasm = { path = "..", features = ["fpu"] }
anyhow = "1.0.71"
wasmparser = { version = "0.233.0", default-features = false, features = ["validate", "features"] }
wast = "=64.0"

[features]
default = []
debug-print = ["rwasm/debug-print"]